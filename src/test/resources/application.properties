# Test configuration using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Redis auto-configuration for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration

# Disable Kafka auto-configuration for unit tests
spring.kafka.bootstrap-servers=localhost:9092

# JWT
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration=86400000

# Kafka Topics
app.kafka.topic.payment-notification=payment-notifications
app.kafka.topic.payment-completed=payment-completed

# Suppress cache logs
logging.level.org.springframework.cache=ERROR
logging.level.com.paymentwallet=ERROR
